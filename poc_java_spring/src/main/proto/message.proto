edition = "2024";

package thapo.pocspring.proto;

import "google/protobuf/wrappers.proto";

option java_package = "thapo.pocspring.application.proto.generated";


message HelloRequest {
  // Mirrors GraphQL `hello(name: String)` where `name` may be omitted.
  google.protobuf.StringValue name = 1;
}

message HelloResponse {
  string message = 1;
}

message GetTestResponse {
  string message = 1;
}

message ListBooksResponse {
  repeated Book books = 1;
}

message GetBookByIdRequest {
  string id = 1;
}

message GetBookByIdResponse {
  // Omitted when the GraphQL `bookById` query resolves to null.
  Book book = 1;
}

message AddBookRequest {
  string title = 1;
  string author = 2;
}

message Book {
  string id = 1;
  string title = 2;
  string author = 3;
}

